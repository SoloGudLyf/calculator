<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="display">0</div>
      <div class="btns">
        <div class="row1">
          <button>C</button><button class="clear">del</button><button>÷</button>
        </div>
        <div class="btnsBody">
          <button>7</button><button>8</button><button>9</button
          ><button>×</button><button>4</button><button>5</button
          ><button>6</button><button>-</button><button>1</button
          ><button>2</button><button>3</button><button>+</button>
        </div>
        <div class="row5">
          <button class="downLeft">0</button><button>.</button><button class="equalTo">=</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
